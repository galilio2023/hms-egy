name: Code Quality & Review

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check (TypeScript)
        run: npx tsc --noEmit
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          # Using dummy values for build-time validation if needed
          DATABASE_URL: "postgres://dummy:dummy@localhost:5432/dummy"
          BETTER_AUTH_SECRET: "dummy_secret_for_ci_build"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
